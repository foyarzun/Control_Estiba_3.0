<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMSA — Inicio de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            animation: floatGlow 8s ease-in-out infinite;
        }

        .bg-glow-1 { top: -150px; left: -100px; background: #3b82f6; }
        .bg-glow-2 { bottom: -150px; right: -100px; background: #8b5cf6; animation-delay: 4s; }
        .bg-glow-3 { top: 30%; left: 60%; background: #10b981; width: 300px; height: 300px; animation-delay: 2s; }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 1;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo .icon-box {
            display: inline-flex;
            width: 72px; height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 12px 40px rgba(59,130,246,0.3);
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-secondary);
            font-size: 1rem;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .input-wrapper input::placeholder {
            color: rgba(148,163,184,0.5);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            pointer-events: all;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
            background-size: 200% 200%;
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(59,130,246,0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            display: none;
            padding: 12px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: var(--accent-red);
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 16px;
            text-align: center;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .roles-info {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .roles-info p {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .role-chips {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .role-chip.op { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
        .role-chip.va { background: rgba(16,185,129,0.1); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.2); }
        .role-chip.ad { background: rgba(139,92,246,0.1); color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.2); }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: rgba(148,163,184,0.4);
        }
    </style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="bg-glow bg-glow-3"></div>

<div class="login-container">
    <div class="login-logo">
        <div class="icon-box"><i class="bi bi-boxes"></i></div>
        <h1>Control de Estibas</h1>
        <p>Sistema de Control y Despacho — AMSA</p>
    </div>

    <div class="login-card">
        <div class="form-group">
            <label>Usuario</label>
            <div class="input-wrapper">
                <i class="bi bi-person-fill"></i>
                <input type="text" id="inputUser" placeholder="Ingrese su usuario" autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="bi bi-lock-fill"></i>
                <input type="password" id="inputPass" placeholder="Ingrese su contraseña" autocomplete="current-password">
                <button class="toggle-password" onclick="togglePass()">
                    <i class="bi bi-eye-fill" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="errorText">Usuario o contraseña incorrectos</span>
        </div>

        <button class="btn-login" onclick="iniciarSesion()">
            <i class="bi bi-box-arrow-in-right"></i>
            Iniciar Sesión
        </button>

        <div class="roles-info">
            <p>Tipos de acceso</p>
            <div class="role-chips">
                <div class="role-chip op"><i class="bi bi-clipboard-data"></i> Operario</div>
                <div class="role-chip va"><i class="bi bi-shield-check"></i> Validador</div>
                <div class="role-chip ad"><i class="bi bi-gear-fill"></i> Admin</div>
            </div>
        </div>
    </div>

    <div class="footer-text">
        AMSA — Sistema de Control de Estibas v3.0
    </div>
</div>

<script>
    // Initialize default users if none exist
    function initUsers() {
        const existing = localStorage.getItem('amsa_users');
        if (!existing) {
            const defaultUsers = [
                { username: 'admin', password: 'admin2026', role: 'admin', nombre: 'Administrador AMSA' },
                { username: 'operario', password: 'oper2026', role: 'operario', nombre: 'Operario Planta' },
                { username: 'validador', password: 'valid2026', role: 'validador', nombre: 'Asistente de Validación' }
            ];
            localStorage.setItem('amsa_users', JSON.stringify(defaultUsers));
        }
    }

    // Check if already logged in
    function checkSession() {
        const session = JSON.parse(sessionStorage.getItem('amsa_session') || 'null');
        if (session) {
            redirectByRole(session.role);
        }
    }

    function redirectByRole(role) {
        switch(role) {
            case 'operario': window.location.href = 'index.html'; break;
            case 'validador': window.location.href = 'Panel_asistente.html'; break;
            case 'admin': window.location.href = 'admin.html'; break;
        }
    }

    function iniciarSesion() {
        const username = document.getElementById('inputUser').value.trim().toLowerCase();
        const password = document.getElementById('inputPass').value;

        if (!username || !password) {
            showError('Debe completar usuario y contraseña');
            return;
        }

        const users = JSON.parse(localStorage.getItem('amsa_users') || '[]');
        const user = users.find(u => u.username.toLowerCase() === username && u.password === password);

        if (!user) {
            showError('Usuario o contraseña incorrectos');
            return;
        }

        // Create session
        const session = {
            username: user.username,
            role: user.role,
            nombre: user.nombre,
            loginTime: new Date().toLocaleString('es-CL')
        };
        sessionStorage.setItem('amsa_session', JSON.stringify(session));

        redirectByRole(user.role);
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    function togglePass() {
        const input = document.getElementById('inputPass');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash-fill';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye-fill';
        }
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
        initUsers();
        checkSession();
        document.getElementById('inputPass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('inputUser').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('inputPass').focus();
        });
    });
</script>

</body>
</html>
